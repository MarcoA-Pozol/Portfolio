<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marco Pozol · FullStack & Cloud Engineer</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <script defer src="script.js"></script>
    <script defer src="contact.js"></script>
    <script src="get_commits.js"></script>
</head>

<body class="centered-gradient">

<div class="lang-switcher">
    <button onclick="setLanguage('en')">EN</button>
    <button onclick="setLanguage('es')">ES</button>
</div>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">

        <span class="hero-badge">
            <i class="fas fa-cloud"></i>
            <span data-i18n="hero_badge"></span>
        </span>

        <h1 class="hero-title">
            <span class="hero-greeting">{</span> 
            Marco Pozol <span class="hero-greeting">:</span> 
            <span class="hero-highlight" data-i18n="hero_title_highlight"></span>
            <span class="hero-greeting">}</span>
        </h1>

        <p class="hero-subtitle" data-i18n="hero_subtitle"></p>

        <div class="hero-cta">
            <a href="#experience" class="btn-primary">
                <i class="fas fa-arrow-down"></i>
                <span data-i18n="projects_btn"></span>
            </a>

            <a href="assets/MarcoAPozol_Resume.pdf" download class="btn-outline">
                <i class="fas fa-download"></i>
                <span data-i18n="resume_btn"></span>
            </a>
        </div>
    </div>

    <div class="hero-stats">
        <div class="stat-item">
            <i class="fas fa-laptop"></i>
            <strong>4+</strong>
            <span data-i18n="stats_projects"></span>
        </div>
        <div class="stat-item">
            <i class="fas fa-code-branch"></i>
            <strong>2+</strong>
            <span data-i18n="stats_experience"></span>
        </div>
        <div class="stat-item">
            <i class="fas fa-cloud-upload"></i>
            <strong>2</strong>
            <span data-i18n="stats_systems"></span>
        </div>
    </div>

    <div class="blush-glow first"></div>
    <div class="blush-glow second"></div>
</section>

<!-- ABOUT -->
<section class="aboutme">
    <div class="aboutme-grid">

        <aside class="abt-info left">
            <h2 data-i18n="about_title"></h2>

            <p>
                <i class="fas fa-terminal" style="color:#9b59b6; margin-right:8px;"></i>
                <span data-i18n="about_text"></span>
            </p>

            <div class="availability-tag">
                <span class="pulse-dot"></span>
                <span data-i18n="availability"></span>
            </div>
        </aside>

        <div class="abt-info photo">
            <img id="dev-photo" src="assets/profile_image.jpg" alt="MarcoA-Pozol">
        </div>

        <aside class="abt-info right">
            <ul>
                <li>
                    <i class="fas fa-certificate"></i>
                    <strong>AWS</strong>
                    <p>Lambda, IoT Core, Aurora DSQL, API Gateway, AWS SES</p>
                </li>
                <li>
                    <i class="fas fa-code"></i>
                    <strong>Full-Stack</strong>
                    <p>React Native, Django, FastAPI, TypeScript, Flutter</p>
                </li>
                <li>
                    <i class="fas fa-credit-card"></i>
                    <strong>Payments</strong>
                    <p>Openpay / Facturapi</p>
                </li>
            </ul>
        </aside>
    </div>
</section>
    
<!-- EXPERIENCE -->
<section class="experience-section" id="experience">
    <h2 class="section-title">
        <i class="fas fa-briefcase"></i>
        <span data-i18n="experience_title"></span>
    </h2>

    <div class="experience-card">
        <div class="exp-header">
            <i class="fas fa-microchip"></i>
            <div>
                <h3 data-i18n="exp1_title"></h3>
                <span class="exp-date" data-i18n="exp1_date"></span>
            </div>
        </div>

        <p data-i18n="exp1_role"></p>

        <ul class="exp-details">
            <li><i class="fas fa-check-circle"></i> <span data-i18n="exp1_1"></span></li>
            <li><i class="fas fa-check-circle"></i> <span data-i18n="exp1_2"></span></li>
            <li><i class="fas fa-check-circle"></i> <span data-i18n="exp1_3"></span></li>
            <li><i class="fas fa-check-circle"></i> <span data-i18n="exp1_4"></span></li>
        </ul>
    </div>

    <div class="experience-card">
        <div class="exp-header">
            <i class="fas fa-industry"></i>
            <div>
                <h3 data-i18n="exp2_title"></h3>
                <span class="exp-date" data-i18n="exp2_date"></span>
            </div>
        </div>

        <p data-i18n="exp2_role"></p>

        <ul class="exp-details">
            <li><i class="fas fa-check-circle"></i> <span data-i18n="exp2_1"></span></li>
            <li><i class="fas fa-check-circle"></i> <span data-i18n="exp2_2"></span></li>
            <li><i class="fas fa-check-circle"></i> <span data-i18n="exp2_3"></span></li>
        </ul>
    </div>
</section>

<!-- SKILLS -->
<section class="skills-section">
    <h2 class="section-title">
        <i class="fas fa-cogs"></i>
        <span data-i18n="skills_title"></span>
    </h2>

    <div class="skills-grid">

        <div class="skill-category">
            <h3><i class="fas fa-cloud"></i> <span data-i18n="cloud_title"></span></h3>
            <li data-i18n="cloudskills_list_1"></li>
            <li data-i18n="cloudskills_list_2"></li>
            <li data-i18n="cloudskills_list_3"></li>
            <li data-i18n="cloudskills_list_4"></li>
        </div>
        
        <div class="skill-category">
            <h3><i class="fas fa-code"></i> <span data-i18n="fullstack_title"></span></h3>
            <li data-i18n="fullstackskills_list_1"></li>
            <li data-i18n="fullstackskills_list_2"></li>
            <li data-i18n="fullstackskills_list_3"></li>
            <li data-i18n="fullstackskills_list_4"></li>
        </div>

        <div class="skill-category">
            <h3><i class="fas fa-handshake"></i> <span data-i18n="softskills_title"></span></h3>
            <ul>
                <li data-i18n="softskills_list_1"></li>
                <li data-i18n="softskills_list_2"></li>
                <li data-i18n="softskills_list_3"></li>
                <li data-i18n="softskills_list_4"></li>
            </ul>
        </div>

        <div class="skill-category">
            <h3><i class="fas fa-tools"></i> <span data-i18n="devops_title"></span></h3>
            <li data-i18n="devopsskills_list_1"></li>
            <li data-i18n="devopsskills_list_2"></li>
            <li data-i18n="devopsskills_list_3"></li>
            <li data-i18n="devopsskills_list_4"></li>
        </div>

    </div>
</section>


<!-- PROJECTS -->
<div class="projects-container" id="projects">
    <h2 class="section-title">
        <i class="fas fa-project-diagram"></i>
        <span data-i18n="projects_title"></span>
    </h2>
    <div id="projects-list"></div>
</div>

<!-- EDUCATION -->
<section class="education-languages">

    <div class="edu-card">
        <h2><i class="fas fa-graduation-cap"></i> <span data-i18n="education_title"></span></h2>
        <p><strong data-i18n="education_degree"></strong></p>
        <p data-i18n="education_date"></p>
        <p class="edu-description" data-i18n="education_desc"></p>
    </div>

    <div class="lang-card">
        <h2><i class="fas fa-language"></i> <span data-i18n="languages_title"></span></h2>
        <ul>
            <li>
                <img src="assets/svg/usflag.svg" class="flag-icon">
                <span data-i18n="english_level"></span>
            </li>
        </ul>
    </div>

</section>

<!-- CONTACT -->
<div class="contacts-container">
    <h2>
        <i class="fas fa-paper-plane"></i>
        <span data-i18n="contact_title"></span>
    </h2>

    <div id="contacts-list"></div>

    <span id="last-message">
        <i class="fas fa-handshake"></i>
        <span data-i18n="contact_message"></span>
    </span>
</div>

<!-- FOOTER -->
<footer>
    <p data-i18n="footer"></p>
</footer>

</body>
</html>
